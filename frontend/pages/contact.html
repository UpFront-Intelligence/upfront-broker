<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UpFront Broker — Contact</title>
  <link rel="stylesheet" href="/static/main.css?v=13">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    #page-content { padding:24px 28px; max-width:1100px; }
    .detail-grid { display:grid; grid-template-columns:1fr 300px; gap:20px; }
    @media(max-width:900px){ .detail-grid{ grid-template-columns:1fr; } }
    .dc { background:#fff; border:1px solid var(--cream-dark); border-radius:var(--radius-lg); box-shadow:var(--shadow-card); margin-bottom:16px; overflow:hidden; }
    .dc-title { font-family:var(--font-serif); font-size:13.5px; color:var(--navy); padding:11px 16px; border-bottom:1px solid var(--cream-dark); background:var(--cream); }
    .dc-body { padding:12px 16px; }
    .fr { display:flex; align-items:baseline; gap:6px; padding:5px 0; border-bottom:1px solid var(--cream-dark); }
    .fr:last-child { border-bottom:none; }
    .fl { font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--stone); min-width:120px; flex-shrink:0; padding-top:2px; }
    .fv { font-size:13px; color:var(--ink); cursor:pointer; padding:1px 5px; border-radius:3px; transition:background 0.1s; word-break:break-word; }
    .fv:hover { background:var(--cream-dark); }
    .fv[data-empty]::before { content:'—'; color:var(--stone-light); }
    .fv[data-empty]:hover::before { content:'— +'; }
    .chip { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:500; background:var(--cream-dark); color:var(--navy); cursor:pointer; margin:2px; text-decoration:none; transition:all 0.1s; }
    .chip:hover { background:var(--navy); color:#fff; }
    .act-item { display:flex; gap:10px; padding:8px 0; border-bottom:1px solid var(--cream-dark); font-size:12.5px; }
    .act-item:last-child { border-bottom:none; }
    .header-card { display:flex; align-items:center; gap:20px; background:#fff; border:1px solid var(--cream-dark); border-radius:var(--radius-lg); padding:20px 24px; margin-bottom:20px; box-shadow:var(--shadow-card); }
    .contact-av { width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; color:#fff; flex-shrink:0; }
    .header-name { font-family:var(--font-serif); font-size:20px; color:var(--navy); }
    .header-sub  { font-size:13px; color:var(--stone); margin-top:3px; }
  </style>
</head>
<body>
<div id="sidebar"></div>
<div id="main">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <div id="record-nav" style="display:flex;align-items:center;gap:8px"></div>
      <div class="topbar-title" id="page-title">Contact</div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-outline btn-sm" onclick="navigate('contacts')">All Contacts</button>
    </div>
  </div>
  <div id="page-content" class="fade-in">
    <div id="root"><div style="text-align:center;padding:60px"><div class="spinner"></div></div></div>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/app.js?v=13"></script>
<script src="/js/broker_segments.js?v=2"></script>
<script src="/js/national_locations_layer.js?v=9"></script>
<script>
  if (!Auth.requireAuth()) throw new Error('Not authenticated');
  renderSidebar('contacts');

  const ID = +new URLSearchParams(window.location.search).get('id');
  RecordNav.render('record-nav', 'contact', ID);
  const SILO = 'contacts';
  let MAP_DATA = null, detailMap = null, detailMapExpanded = false;
  const ACT_ICONS = {'Call':'📞','Email':'✉️','Meeting':'🤝','Tour':'🏢','Offer':'📋','LOI':'📄','Contract':'✍️','Note':'📝'};
  const TYPE_CLASS = {'Owner':'badge-navy','Buyer':'badge-green','Tenant':'badge-blue','Attorney':'badge-stone','Lender':'badge-amber','Broker':'badge-gold'};
  const PHONE_LABELS = ['mobile','office','direct','fax','other'];
  let REC = {};

  async function load() {
    try {
      const d = await API.get(`/${SILO}/${ID}/full`);
      REC = d.contact;
      REC.phones = d.phones || [];
      const name = `${REC.first_name||''} ${REC.last_name||''}`.trim();
      document.getElementById('page-title').textContent = name || 'Contact';
      document.title = (name || 'Contact') + ' — UpFront Broker';
      render(d);
    } catch(e) { Toast.error('Failed to load: ' + e.message); }
  }

  function frow(label, field, value, opts) {
    const display = value != null && value !== '' ? String(value) : '';
    const attrs = display ? `data-raw="${display.replace(/"/g,'&quot;')}"` : 'data-empty data-raw=""';
    const click = `onclick="ef(this,'${field}'${opts ? ','+JSON.stringify(opts) : ''})"`;
    return `<div class="fr"><span class="fl">${label}</span><span class="fv" ${attrs} ${click}>${display}</span></div>`;
  }

  // ── Phones ───────────────────────────────────────────────────────
  function phoneLabelOptions(selected) {
    return PHONE_LABELS.map(l => `<option value="${l}" ${l===selected?'selected':''}>${l}</option>`).join('');
  }

  function phonesListHtml(phones) {
    if (!phones || !phones.length) {
      return '<div style="font-size:12.5px;color:var(--stone-light);padding:3px 0">No phone numbers</div>';
    }
    return phones.map(p => `
      <div class="phone-row" data-id="${p.id}" style="display:flex;align-items:center;gap:8px;padding:4px 0;flex-wrap:wrap">
        <span style="font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--stone);min-width:50px">${p.label || 'other'}</span>
        <span style="font-size:13px">${p.number}</span>
        ${p.is_primary ? '<span class="badge badge-navy">Primary</span>' : ''}
        <span style="margin-left:auto;display:flex;gap:4px">
          <button class="btn btn-ghost btn-sm" onclick="editPhoneRow(${p.id})">Edit</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deletePhone(${p.id})">✕</button>
        </span>
      </div>`).join('');
  }

  function renderPhones() {
    const el = document.getElementById('phones-list');
    if (el) el.innerHTML = phonesListHtml(REC.phones);
  }

  async function reloadPhones() {
    REC.phones = await API.get(`/contacts/${ID}/phones`);
    renderPhones();
  }

  function showAddPhoneForm() {
    if (document.getElementById('phone-form')) return;
    const el = document.getElementById('phones-list');
    const form = document.createElement('div');
    form.id = 'phone-form';
    form.style.cssText = 'display:flex;align-items:center;gap:8px;padding:6px 0;flex-wrap:wrap';
    form.innerHTML = `
      <select class="form-control" id="pf-label" style="width:auto;font-size:13px;padding:4px 6px">${phoneLabelOptions('mobile')}</select>
      <input type="tel" class="form-control" id="pf-number" placeholder="Phone number" style="width:160px;font-size:13px;padding:4px 6px">
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--stone)">
        <input type="checkbox" id="pf-primary"> Primary
      </label>
      <button class="btn btn-primary btn-sm" onclick="savePhone()">Save</button>
      <button class="btn btn-ghost btn-sm" onclick="this.closest('#phone-form').remove()">Cancel</button>`;
    el.appendChild(form);
    document.getElementById('pf-number').focus();
  }

  async function savePhone() {
    const label = document.getElementById('pf-label').value;
    const number = document.getElementById('pf-number').value.trim();
    const is_primary = document.getElementById('pf-primary').checked;
    if (!number) { Toast.error('Enter a phone number'); return; }
    try {
      await API.post(`/contacts/${ID}/phones`, { label, number, is_primary });
      await reloadPhones();
      Toast.success('Phone added');
    } catch(e) { Toast.error(e.message); }
  }

  function editPhoneRow(id) {
    const p = (REC.phones || []).find(x => x.id === id);
    const row = document.querySelector(`.phone-row[data-id="${id}"]`);
    if (!p || !row) return;
    row.innerHTML = `
      <select class="form-control" id="pf-label-${id}" style="width:auto;font-size:13px;padding:4px 6px">${phoneLabelOptions(p.label)}</select>
      <input type="tel" class="form-control" id="pf-number-${id}" value="${(p.number||'').replace(/"/g,'&quot;')}" style="width:160px;font-size:13px;padding:4px 6px">
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--stone)">
        <input type="checkbox" id="pf-primary-${id}" ${p.is_primary?'checked':''}> Primary
      </label>
      <button class="btn btn-primary btn-sm" onclick="savePhoneEdit(${id})">Save</button>
      <button class="btn btn-ghost btn-sm" onclick="renderPhones()">Cancel</button>`;
  }

  async function savePhoneEdit(id) {
    const label = document.getElementById(`pf-label-${id}`).value;
    const number = document.getElementById(`pf-number-${id}`).value.trim();
    const is_primary = document.getElementById(`pf-primary-${id}`).checked;
    if (!number) { Toast.error('Enter a phone number'); return; }
    try {
      await API.put(`/contacts/${ID}/phones/${id}`, { label, number, is_primary });
      await reloadPhones();
      Toast.success('Saved');
    } catch(e) { Toast.error(e.message); }
  }

  async function deletePhone(id) {
    if (!confirm('Delete this phone number?')) return;
    try {
      await API.delete(`/contacts/${ID}/phones/${id}`);
      await reloadPhones();
      Toast.success('Deleted');
    } catch(e) { Toast.error(e.message); }
  }

  function render(d) {
    const c = d.contact;
    const name = `${c.first_name||''} ${c.last_name||''}`.trim();
    const initials = Fmt.initials(c.first_name, c.last_name);
    const color = avatarColor((c.first_name||'') + (c.last_name||''));

    document.getElementById('root').innerHTML = `
      <div class="header-card">
        <div class="contact-av" style="background:${color}">${initials}</div>
        <div>
          <div class="header-name">${name || '—'}</div>
          <div class="header-sub">${[c.title, c.contact_type].filter(Boolean).join(' · ') || ''}</div>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
          ${c.contact_type ? `<span class="badge ${TYPE_CLASS[c.contact_type]||'badge-stone'}">${c.contact_type}</span>` : ''}
          ${c.tenant_id ? `<a href="/pages/tenant.html?id=${c.tenant_id}" style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600;background:rgba(201,148,58,0.15);color:var(--gold);text-decoration:none;border:1px solid rgba(201,148,58,0.3)">⬡ ${c.tenant_name||'Tenant'}</a>` : ''}
        </div>
      </div>

      <div class="detail-grid">
        <div>
          <div class="dc"><div class="dc-title">Contact Info</div><div class="dc-body">
            ${frow('First Name',  'first_name', c.first_name)}
            ${frow('Last Name',   'last_name',  c.last_name)}
            ${frow('Title',       'title',      c.title)}
            ${frow('Email',       'email',      c.email,   {inputType:'email'})}
            <div class="fr" style="flex-direction:column;align-items:stretch;gap:4px">
              <div style="display:flex;align-items:center">
                <span class="fl">Phones</span>
                <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="showAddPhoneForm()">+ Add phone</button>
              </div>
              <div id="phones-list">${phonesListHtml(d.phones)}</div>
            </div>
            ${frow('Mobile',      'mobile',     c.mobile,  {inputType:'tel'})}
            ${frow('LinkedIn',    'linkedin',   c.linkedin)}
          </div></div>

          <div class="dc"><div class="dc-title">Classification</div><div class="dc-body">
            ${frow('Type',   'contact_type', c.contact_type, {choices:['Owner','Buyer','Tenant','Attorney','Lender','Broker']})}
            ${frow('Source', 'source',       c.source, {choices:['Referral','CRE Platform','Cold Call','Networking','LinkedIn','Website','Other']})}
            <div class="fr"><span class="fl">Tags</span>
              <span style="font-size:13px">${(c.tags||[]).map(t=>`<span class="badge badge-stone">${t}</span>`).join(' ') || '<span style="color:var(--stone-light)">—</span>'}</span>
            </div>
            ${c.tenant_id ? `<div class="fr"><span class="fl">Tenant</span>
              <a href="/pages/tenant.html?id=${c.tenant_id}" class="chip" style="text-decoration:none;font-size:12px">⬡ ${c.tenant_name||'Tenant'}</a>
            </div>` : ''}
          </div></div>

          <div class="dc"><div class="dc-title">Notes</div><div class="dc-body">
            <span class="fv" style="min-height:60px;display:block;white-space:pre-wrap"
              data-raw="${(c.notes||'').replace(/"/g,'&quot;')}" onclick="ef(this,'notes',{multiline:true})">${c.notes||'—'}</span>
          </div></div>
        </div>

        <div>
          <div class="dc"><div class="dc-title">Linked Accounts</div><div class="dc-body" style="padding:10px">
            ${d.accounts.length ? d.accounts.map(a =>
              `<a class="chip" href="/pages/account.html?id=${a.id}">◻ ${a.name}${a.role?' · '+a.role:''}</a>`
            ).join('') : '<span style="font-size:12.5px;color:var(--stone)">No linked accounts</span>'}
          </div></div>

          <div class="dc"><div class="dc-title">Deals</div><div class="dc-body" style="padding:8px">
            ${d.deals.length ? d.deals.map(de =>
              `<a class="chip" style="display:flex;justify-content:space-between;border-radius:var(--radius);width:100%;padding:8px 10px;margin:3px 0"
                 href="/pages/deal.html?id=${de.id}">
                <span>${de.name}</span>
                <span class="stage-pill ${Fmt.stageClass(de.stage)}" style="font-size:10px">${de.stage}</span>
              </a>`).join('') : '<span style="font-size:12.5px;color:var(--stone);padding:4px">No deals</span>'}
          </div></div>

          <div class="dc"><div class="dc-title">Activity</div><div class="dc-body">
            ${d.activities.length ? d.activities.map(a => `
              <div class="act-item">
                <span>${ACT_ICONS[a.activity_type]||'●'}</span>
                <div>
                  <div style="font-weight:500">${a.activity_type}${a.subject?' — '+a.subject:''}</div>
                  <div style="font-size:11px;color:var(--stone-light)">${Fmt.date(a.activity_date||a.created_at)}</div>
                </div>
              </div>`).join('') : '<span style="font-size:12.5px;color:var(--stone)">No activity yet</span>'}
          </div></div>

          <div class="dc" id="map-card">
            <div class="dc-title" style="display:flex;justify-content:space-between;align-items:center">
              <span>Map</span>
              <button class="btn btn-ghost btn-sm" id="map-toggle-btn" onclick="toggleDetailMap()">Show</button>
            </div>
            <div class="dc-body" id="map-card-body" style="display:none;padding:0"></div>
          </div>

          <div class="dc" id="lists-card"><div class="dc-title">Marketing Lists</div><div class="dc-body" style="padding:10px" id="lists-card-body">
            <div style="font-size:12.5px;color:var(--stone)">Loading…</div>
          </div></div>
        </div>
      </div>`;

    MAP_DATA = {
      ownLat: c.lat, ownLng: c.lng, ownLabel: name || 'Contact',
      properties: d.linked_properties || [],
    };
  }

  async function ef(el, field, opts) {
    const raw = el.dataset.raw;
    const orig = el.cloneNode(true);
    let input;
    if (opts?.choices) {
      input = document.createElement('select');
      input.className = 'form-control';
      input.style.cssText = 'display:inline-block;width:auto;font-size:13px;padding:2px 6px;';
      [['','—'], ...opts.choices.map(c => [c,c])].forEach(([v,l]) => {
        const o = document.createElement('option');
        o.value = v; o.textContent = l;
        if (v === raw) o.selected = true;
        input.appendChild(o);
      });
    } else if (opts?.multiline) {
      input = document.createElement('textarea');
      input.className = 'form-control';
      input.style.cssText = 'width:100%;min-height:80px;font-size:13px;';
      input.value = raw;
    } else {
      input = document.createElement('input');
      input.type = opts?.inputType || 'text';
      input.className = 'form-control';
      input.style.cssText = 'display:inline-block;width:180px;font-size:13px;padding:2px 6px;';
      input.value = raw;
    }
    el.replaceWith(input);
    input.focus();
    if (input.tagName === 'INPUT') input.select();
    async function save() {
      const v = input.value;
      if (v === raw) { input.replaceWith(orig); return; }
      try {
        const updated = await API.put(`/${SILO}/${ID}`, { [field]: v || null });
        Object.assign(REC, updated);
        const neo = orig.cloneNode(true);
        const newRaw = updated[field] != null ? String(updated[field]) : '';
        neo.dataset.raw = newRaw;
        if (newRaw) { delete neo.dataset.empty; neo.textContent = newRaw; }
        else { neo.dataset.empty = ''; neo.textContent = ''; }
        input.replaceWith(neo);
        Toast.success('Saved');
      } catch(e) { input.replaceWith(orig); Toast.error(e.message); }
    }
    input.addEventListener('blur', save);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !opts?.multiline) { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') input.replaceWith(orig);
    });
  }

  // ── Map card — pins for every property linked via property_parties
  // (zero geocoding here, that data already exists) plus the contact's
  // own office pin if geocoded. Lazy-initialized on first expand, same
  // pattern as property.html's Map tab. ──────────────────────────────
  function toggleDetailMap() {
    detailMapExpanded = !detailMapExpanded;
    document.getElementById('map-card-body').style.display = detailMapExpanded ? 'block' : 'none';
    document.getElementById('map-toggle-btn').textContent = detailMapExpanded ? 'Hide' : 'Show';
    if (detailMapExpanded && !detailMap) initDetailMap();
    else if (detailMap) setTimeout(() => detailMap.invalidateSize(), 50);
  }

  function initDetailMap() {
    const body = document.getElementById('map-card-body');
    const pins = [];
    if (MAP_DATA.ownLat != null && MAP_DATA.ownLng != null) {
      pins.push({ lat: MAP_DATA.ownLat, lng: MAP_DATA.ownLng, label: MAP_DATA.ownLabel + ' (office)', own: true });
    }
    MAP_DATA.properties.forEach(p => {
      if (p.lat != null && p.lng != null) pins.push({ lat: p.lat, lng: p.lng, label: p.address || 'Property' });
    });

    if (!pins.length) {
      body.innerHTML = '<div class="no-location" style="padding:16px;font-size:12.5px;color:var(--text-secondary)">No location data yet</div>';
      return;
    }

    body.innerHTML = '<div id="detail-map" style="height:240px"></div>';
    const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#1F5E52';
    detailMap = L.map('detail-map', { zoomControl: true, attributionControl: false })
      .setView([pins[0].lat, pins[0].lng], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(detailMap);
    const markers = pins.map(p => L.circleMarker([p.lat, p.lng], {
      radius: p.own ? 9 : 6, fillColor: accent, color: '#fff', weight: 1.5, fillOpacity: 0.9,
    }).bindTooltip(p.label).addTo(detailMap));
    if (markers.length > 1) {
      try { detailMap.fitBounds(L.featureGroup(markers).getBounds(), { padding: [24, 24] }); } catch (_) {}
    }
    NatLocs.init(detailMap);
  }

  // ── Marketing Lists card ──────────────────────────────────────────
  let ALL_LISTS = [];

  async function loadListsCard() {
    try {
      ALL_LISTS = await API.get('/marketing-lists/');
      renderListsCard();
    } catch(e) {}
  }

  function renderListsCard() {
    const el = document.getElementById('lists-card-body');
    if (!el) return;
    el.innerHTML = `<button class="btn btn-outline btn-sm" id="add-to-list-btn"
      style="width:100%;text-align:left">+ Add to list ▾</button>`;
    document.getElementById('add-to-list-btn').addEventListener('click', openListsPicker);
  }

  function openListsPicker() {
    const btn = document.getElementById('add-to-list-btn');
    if (!btn) return;
    const items = [
      ...ALL_LISTS.map(l => ({
        label: l.name,
        meta:  String(l.member_count),
        value: { id: l.id, name: l.name, action: 'add' },
      })),
      { label: '+ Create new list…', meta: '', value: { action: 'create' } },
    ];
    Typeahead.open(btn, items, item => {
      if (item.value.action === 'create') promptCreateAndAdd();
      else addToList(item.value.id, item.value.name);
    });
  }

  async function promptCreateAndAdd() {
    const name = window.prompt('New list name:');
    if (!name || !name.trim()) return;
    createAndAdd(name.trim());
  }

  async function addToList(listId, listName) {
    const p = document.getElementById('lists-picker');
    if (p) p.style.display = 'none';
    try {
      const result = await API.post(`/marketing-lists/${listId}/members`, { contact_id: ID });
      if (result.already_existed) {
        Toast.info(`Already in "${listName}"`);
      } else {
        Toast.success(`Added to "${listName}"`);
      }
      ALL_LISTS = await API.get('/marketing-lists/');
      renderListsCard();
    } catch(e) { Toast.error(e.message); }
  }

  async function createAndAdd(name) {
    try {
      const nl = await API.post('/marketing-lists/', { name });
      await API.post(`/marketing-lists/${nl.id}/members`, { contact_id: ID });
      Toast.success(`Added to new list "${name}"`);
      ALL_LISTS = await API.get('/marketing-lists/');
      renderListsCard();
    } catch(e) { Toast.error(e.message); }
  }

  load().then(() => loadListsCard());
</script>
</body>
</html>
