<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UpFront Broker — Search</title>
  <link rel="stylesheet" href="/static/main.css?v=14">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    #page-content { padding: 0; flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Filter bar ── */
    #filter-bar {
      display: flex; align-items: flex-start; gap: var(--space-3); flex-wrap: wrap;
      padding: var(--space-3) var(--space-4); background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .f-group { display: flex; flex-direction: column; gap: 4px; }
    .f-label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); }
    .f-sel, .f-input { font-size: 12.5px; padding: 6px 9px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font-system); outline: none; background: var(--surface); color: var(--ink); }
    .f-sel:focus, .f-input:focus { border-color: var(--accent); }
    .f-range { display: flex; gap: 4px; align-items: center; }
    .f-range .f-input { width: 70px; }

    .geo-chips { display: flex; flex-wrap: wrap; gap: 5px; max-width: 280px; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px;
      background: rgba(31,94,82,0.08); color: var(--accent); border-radius: var(--radius-sm);
      font-size: 11.5px; font-weight: 500;
    }
    .chip .chip-x { cursor: pointer; opacity: 0.7; font-weight: 700; }
    .chip .chip-x:hover { opacity: 1; }
    .role-chip {
      display: inline-flex; align-items: center; padding: 3px 9px; border-radius: var(--radius-sm);
      font-size: 11.5px; cursor: pointer; border: 1px solid var(--border); background: var(--surface);
      color: var(--text-secondary); user-select: none;
    }
    .role-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .role-chips { display: flex; flex-wrap: wrap; gap: 4px; max-width: 280px; }

    /* ── Map + List layout ── */
    #browse-layout { flex: 1; display: flex; overflow: hidden; min-height: 0; }
    #map-pane { width: 50%; position: relative; flex-shrink: 0; border-right: 1px solid var(--border); transition: width 0.2s; }
    #browse-layout.map-collapsed #map-pane { width: 0; border-right: none; overflow: hidden; }
    #browse-layout.map-collapsed #list-pane { flex: 1; }
    #search-map { width: 100%; height: 100%; }
    #map-toggle {
      position: absolute; top: 10px; right: 10px; z-index: 500;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 6px 10px; font-size: 12px; cursor: pointer; box-shadow: var(--shadow-sm);
    }
    #map-reopen { display: none; }
    #browse-layout.map-collapsed #map-reopen { display: inline-flex; }

    #list-pane { flex: 1; overflow-y: auto; min-width: 0; }
    #list-count { padding: 10px var(--space-4) 4px; font-size: 12.5px; color: var(--text-secondary); }
    table.search-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .search-table th {
      position: sticky; top: 0; background: var(--surface); text-align: left; padding: 8px 12px;
      font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--text-secondary); border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer;
    }
    .search-table th:hover { color: var(--ink); }
    .search-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .search-table tr.data-row { cursor: pointer; }
    .search-table tr.data-row:hover td, .search-table tr.data-row.row-hover td { background: var(--paper); }
    .data-figure { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
<div id="sidebar"></div>

<div id="main">
  <div id="topbar">
    <div class="topbar-title">Search</div>
    <div class="topbar-actions" id="result-summary" style="font-size:12px;color:var(--text-secondary)"></div>
  </div>

  <div id="page-content" class="fade-in">
    <div id="filter-bar">
      <div class="f-group">
        <span class="f-label">Records</span>
        <select class="f-sel" id="f-return" onchange="onReturnChange()">
          <option value="properties">Properties</option>
          <option value="accounts">Accounts</option>
          <option value="contacts">Contacts</option>
          <option value="tenants">Tenants</option>
          <option value="deals">Deals</option>
        </select>
      </div>

      <div class="f-group">
        <span class="f-label">Location</span>
        <input class="f-input" id="f-geo-input" placeholder="City, county, or state…" autocomplete="off" style="width:170px">
        <div class="geo-chips" id="geo-chips"></div>
      </div>

      <div class="f-group" id="g-prop-type">
        <span class="f-label">Property Type</span>
        <select class="f-sel" id="f-prop-type" onchange="runSearch()">
          <option value="">Any category</option>
          <option>Multi-Family</option><option>Office</option><option>Industrial</option>
          <option>Retail</option><option>Health Care</option><option>Hospitality</option>
          <option>Flex</option><option>Land</option><option>Sports &amp; Entertainment</option>
          <option>Specialty</option><option>Uncategorized</option>
        </select>
      </div>

      <div class="f-group" id="g-size">
        <span class="f-label">Size (SF)</span>
        <div class="f-range">
          <input class="f-input" id="f-sf-min" placeholder="Min" inputmode="numeric" oninput="debouncedSearch()">
          <span style="color:var(--text-secondary)">–</span>
          <input class="f-input" id="f-sf-max" placeholder="Max" inputmode="numeric" oninput="debouncedSearch()">
        </div>
      </div>

      <div class="f-group" id="g-price">
        <span class="f-label">Asking Price</span>
        <div class="f-range">
          <input class="f-input" id="f-price-min" placeholder="Min" inputmode="numeric" oninput="debouncedSearch()">
          <span style="color:var(--text-secondary)">–</span>
          <input class="f-input" id="f-price-max" placeholder="Max" inputmode="numeric" oninput="debouncedSearch()">
        </div>
      </div>

      <div class="f-group" id="g-role">
        <span class="f-label">Role</span>
        <div class="role-chips" id="role-chips"></div>
      </div>

      <div class="f-group" id="g-account-name" style="display:none">
        <span class="f-label">Account name</span>
        <input class="f-input" id="f-account-name" placeholder="Search accounts…" autocomplete="off" style="width:160px" oninput="debouncedSearch()">
      </div>

      <div class="f-group" id="g-contact-name" style="display:none">
        <span class="f-label">Contact name</span>
        <input class="f-input" id="f-contact-name" placeholder="Search contacts…" autocomplete="off" style="width:150px" oninput="debouncedSearch()">
      </div>

      <div class="f-group" id="g-contact-title" style="display:none">
        <span class="f-label">Title</span>
        <input class="f-input" id="f-contact-title" placeholder="e.g. CEO…" autocomplete="off" style="width:120px" oninput="debouncedSearch()">
      </div>

      <div class="f-group" id="g-tenant-name" style="display:none">
        <span class="f-label">Tenant name</span>
        <input class="f-input" id="f-tenant-name" placeholder="Search tenants…" autocomplete="off" style="width:150px" oninput="debouncedSearch()">
      </div>

      <div class="f-group" id="g-brand" style="display:none">
        <span class="f-label">Brand</span>
        <input class="f-input" id="f-brand" placeholder="e.g. Starbucks…" autocomplete="off" style="width:140px" oninput="debouncedSearch()">
      </div>

      <div class="f-group" id="g-category" style="display:none">
        <span class="f-label">Category</span>
        <select class="f-sel" id="f-category" onchange="runSearch()">
          <option value="">All categories</option>
          <option value="food_and_drink">Food &amp; Drink</option>
          <option value="shopping">Shopping</option>
          <option value="travel_and_transportation">Travel &amp; Transportation</option>
          <option value="lifestyle_services">Lifestyle Services</option>
          <option value="services_and_business">Services &amp; Business</option>
        </select>
      </div>
    </div>

    <div id="browse-layout">
      <div id="map-pane">
        <button id="map-toggle" onclick="toggleMap()">‹ Hide Map</button>
        <div id="search-map"></div>
      </div>
      <div id="list-pane">
        <div id="list-count">
          <button id="map-reopen" class="btn btn-ghost btn-sm" onclick="toggleMap()">› Show Map</button>
          <span id="list-count-text"></span>
        </div>
        <table class="search-table">
          <thead><tr id="search-thead"></tr></thead>
          <tbody id="search-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/app.js?v=14"></script>
<script src="/js/broker_segments.js?v=2"></script>
<script src="/js/national_locations_layer.js?v=9"></script>
<script>
  if (!Auth.requireAuth()) throw new Error('Not authenticated');
  renderSidebar('search');

  const ROLE_CHIP_VALUES = [
    'owner', 'buyer', 'seller', 'tenant', 'investor', 'developer', 'lender', 'leasing_broker',
  ];
  function renderRoleChips() {
    document.getElementById('role-chips').innerHTML = ROLE_CHIP_VALUES.map(r =>
      `<label class="role-chip ${activeRoles.has(r) ? 'active' : ''}" data-role="${r}" onclick="toggleRoleChip(this)">${r.replace('_', ' ')}</label>`
    ).join('');
  }

  let currentReturn = 'properties';
  let geoChips = [];          // [{value, field}]
  let activeRoles = new Set();
  let currentItems = [];
  let sortCol = null, sortDir = 'asc';
  let leafletMap = null, markers = [];
  let searchTimer = null;

  const RETURN_FIELDS = {
    properties:         ['prop-type', 'size', 'price'],
    accounts:           ['role', 'account-name'],
    contacts:           ['contact-name', 'contact-title'],
    tenants:            ['prop-type', 'tenant-name'],
    deals:              ['prop-type'],
    national_locations: ['brand', 'category'],
  };

  function cssVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  // ── Map ────────────────────────────────────────────────────────
  function initMap() {
    if (leafletMap) return;
    leafletMap = L.map('search-map', { zoomControl: true }).setView([42.6064, -83.1498], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(leafletMap);
  }
  initMap();
  NatLocs.init(leafletMap);   // retail/restaurant overlay, toggle injected into map container

  function toggleMap() {
    const layout = document.getElementById('browse-layout');
    layout.classList.toggle('map-collapsed');
    document.getElementById('map-toggle').textContent =
      layout.classList.contains('map-collapsed') ? '› Show Map' : '‹ Hide Map';
    if (!layout.classList.contains('map-collapsed')) setTimeout(() => leafletMap.invalidateSize(), 210);
  }

  function buildPins(items) {
    const pins = [];
    items.forEach((item, idx) => {
      if (currentReturn === 'properties' || currentReturn === 'tenants') {
        if (item.lat != null && item.lng != null) {
          pins.push({ rowIdx: idx, lat: item.lat, lng: item.lng, label: item.display_name });
        }
      } else if (currentReturn === 'national_locations') {
        if (item.lat != null && item.lng != null) {
          const label = (item.brand_primary || item.name_primary || '') +
            (item.address ? ' — ' + item.address : '');
          pins.push({ rowIdx: idx, lat: item.lat, lng: item.lng, label });
        }
      } else {
        if (item.lat != null && item.lng != null) {
          pins.push({ rowIdx: idx, lat: item.lat, lng: item.lng, label: item.display_name + ' (office)' });
        }
        (item.linked_properties || []).forEach(lp => {
          if (lp.lat != null && lp.lng != null) {
            pins.push({ rowIdx: idx, lat: lp.lat, lng: lp.lng, label: `${item.display_name} — ${lp.address || ''}` });
          }
        });
      }
    });
    return pins;
  }

  let markersByRow = {};

  function renderMap(items) {
    markers.forEach(m => m.remove());
    markers = [];
    markersByRow = {};

    const accent = cssVar('--accent') || '#1F5E52';
    const amber  = cssVar('--dataviz-amber') || '#A8702E';
    const pinColor = currentReturn === 'national_locations' ? amber : accent;
    const pins = buildPins(items);
    pins.forEach(p => {
      const marker = L.circleMarker([p.lat, p.lng], {
        radius: 7, fillColor: pinColor, color: '#fff', weight: 1.5, opacity: 1, fillOpacity: 0.85,
      });
      marker.bindTooltip(p.label, { direction: 'top', offset: [0, -4] });
      marker.on('click', () => goToDetail(items[p.rowIdx]));
      marker.addTo(leafletMap);
      markers.push(marker);
      (markersByRow[p.rowIdx] = markersByRow[p.rowIdx] || []).push(marker);
    });

    if (markers.length) {
      try {
        leafletMap.fitBounds(L.featureGroup(markers).getBounds(), { padding: [24, 24], maxZoom: 14 });
      } catch (_) {}
    }
  }

  function highlightRow(idx, on) {
    (markersByRow[idx] || []).forEach(m => {
      m.setStyle(on
        ? { radius: 11, weight: 3 }
        : { radius: 7, weight: 1.5 });
    });
  }

  // ── Filter bar visibility per Records type ─────────────────────
  function applyReturnVisibility() {
    const visible = RETURN_FIELDS[currentReturn] || [];
    document.getElementById('g-prop-type').style.display = visible.includes('prop-type') ? '' : 'none';
    document.getElementById('g-size').style.display          = visible.includes('size')          ? '' : 'none';
    document.getElementById('g-price').style.display         = visible.includes('price')         ? '' : 'none';
    document.getElementById('g-role').style.display          = visible.includes('role')          ? '' : 'none';
    document.getElementById('g-account-name').style.display  = visible.includes('account-name')  ? '' : 'none';
    document.getElementById('g-contact-name').style.display  = visible.includes('contact-name')  ? '' : 'none';
    document.getElementById('g-contact-title').style.display = visible.includes('contact-title') ? '' : 'none';
    document.getElementById('g-tenant-name').style.display   = visible.includes('tenant-name')   ? '' : 'none';
    document.getElementById('g-brand').style.display         = visible.includes('brand')         ? '' : 'none';
    document.getElementById('g-category').style.display      = visible.includes('category')      ? '' : 'none';
  }

  // User changing the Records dropdown — geography/role filters don't carry
  // across types, so reset them. (Restoring from a URL on load does NOT go
  // through this — see applyUrlParams below.)
  function onReturnChange() {
    currentReturn = document.getElementById('f-return').value;
    applyReturnVisibility();
    geoChips = [];
    activeRoles = new Set();
    renderRoleChips();
    renderGeoChips();
    document.getElementById('f-account-name').value  = '';
    document.getElementById('f-contact-name').value  = '';
    document.getElementById('f-contact-title').value = '';
    document.getElementById('f-tenant-name').value   = '';
    document.getElementById('f-brand').value          = '';
    document.getElementById('f-category').value       = '';
    runSearch();
  }

  // ── URL state — bookmarkable/shareable search, and the "originating
  // search URL" detail pages link back to (see RecordNav in app.js) ──
  function buildUrlParams() {
    const p = new URLSearchParams();
    p.set('return', currentReturn);
    geoChips.forEach(c => p.append(c.field, c.value));
    const pt = document.getElementById('f-prop-type').value;
    if (pt) p.set('property_category', pt);
    const sfMin = document.getElementById('f-sf-min').value.trim();
    if (sfMin) p.set('sf_min', sfMin);
    const sfMax = document.getElementById('f-sf-max').value.trim();
    if (sfMax) p.set('sf_max', sfMax);
    const priceMin = document.getElementById('f-price-min').value.trim();
    if (priceMin) p.set('price_min', priceMin);
    const priceMax = document.getElementById('f-price-max').value.trim();
    if (priceMax) p.set('price_max', priceMax);
    [...activeRoles].forEach(r => p.append('role', r));
    const acctName    = document.getElementById('f-account-name').value.trim();
    if (acctName)  p.set('account_name', acctName);
    const cName       = document.getElementById('f-contact-name').value.trim();
    if (cName)     p.set('contact_name', cName);
    const cTitle      = document.getElementById('f-contact-title').value.trim();
    if (cTitle)    p.set('contact_title', cTitle);
    const tName       = document.getElementById('f-tenant-name').value.trim();
    if (tName)     p.set('tenant_name', tName);
    const brand = document.getElementById('f-brand').value.trim();
    if (brand) p.set('brand', brand);
    const cat = document.getElementById('f-category').value;
    if (cat) p.set('category', cat);
    return p;
  }

  // Returns true if there was anything to restore.
  function applyUrlParams() {
    const p = new URLSearchParams(window.location.search);
    if (![...p.keys()].length) return false;

    const ret = p.get('return');
    if (ret && (RETURN_FIELDS[ret] !== undefined)) {
      currentReturn = ret;
      document.getElementById('f-return').value = ret;
    }
    ['city', 'county', 'state'].forEach(field => {
      p.getAll(field).forEach(value => geoChips.push({ value, field }));
    });
    const pt = p.get('property_category');
    if (pt) document.getElementById('f-prop-type').value = pt;
    const restoreInput = (id, key) => {
      const v = p.get(key);
      if (v) document.getElementById(id).value = v;
    };
    restoreInput('f-sf-min',        'sf_min');
    restoreInput('f-sf-max',        'sf_max');
    restoreInput('f-price-min',     'price_min');
    restoreInput('f-price-max',     'price_max');
    restoreInput('f-account-name',  'account_name');
    restoreInput('f-contact-name',  'contact_name');
    restoreInput('f-contact-title', 'contact_title');
    restoreInput('f-tenant-name',   'tenant_name');
    restoreInput('f-brand',         'brand');
    restoreInput('f-category',      'category');
    p.getAll('role').forEach(r => activeRoles.add(r));
    return true;
  }

  applyUrlParams();
  document.getElementById('f-return').value = currentReturn;
  renderRoleChips();
  applyReturnVisibility();
  renderGeoChips();
  runSearch();

  // ── Geography chips (typeahead) ──────────────────────────────────
  const geoInput = document.getElementById('f-geo-input');
  Typeahead.attach(geoInput, async (q) => {
    const fields = (currentReturn === 'accounts' || currentReturn === 'contacts' || currentReturn === 'national_locations')
      ? ['city', 'state'] : ['city', 'county', 'state'];
    const results = await Promise.all(fields.map(f =>
      API.get(`/query/geo-options?return_type=${currentReturn}&field=${f}&q=${encodeURIComponent(q)}`)
        .then(vals => vals.map(v => ({ value: v, field: f })))
        .catch(() => [])
    ));
    return results.flat().map(r => ({ label: r.value, meta: r.field, value: r }));
  }, (item) => {
    addGeoChip(item.value.value, item.value.field);
    geoInput.value = '';
  });

  function addGeoChip(value, field) {
    if (geoChips.some(c => c.value === value && c.field === field)) return;
    geoChips.push({ value, field });
    renderGeoChips();
    runSearch();
  }

  function removeGeoChip(i) {
    geoChips.splice(i, 1);
    renderGeoChips();
    runSearch();
  }

  function renderGeoChips() {
    document.getElementById('geo-chips').innerHTML = geoChips.map((c, i) =>
      `<span class="chip">${esc(c.value)} <span style="opacity:0.6">(${c.field})</span><span class="chip-x" onclick="removeGeoChip(${i})">✕</span></span>`
    ).join('');
  }

  function toggleRoleChip(el) {
    const role = el.dataset.role;
    if (activeRoles.has(role)) { activeRoles.delete(role); el.classList.remove('active'); }
    else { activeRoles.add(role); el.classList.add('active'); }
    runSearch();
  }

  function debouncedSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(runSearch, 350);
  }

  // ── Build spec + run ────────────────────────────────────────────
  function buildSpec() {
    const spec = { return: currentReturn, limit: 300, offset: 0 };

    const geo = {};
    geoChips.forEach(c => { (geo[c.field] = geo[c.field] || []).push(c.value); });
    if (Object.keys(geo).length) spec.geography = geo;

    const pt = document.getElementById('f-prop-type').value;
    const sfMin = document.getElementById('f-sf-min').value.trim();
    const sfMax = document.getElementById('f-sf-max').value.trim();
    const priceMin = document.getElementById('f-price-min').value.trim();
    const priceMax = document.getElementById('f-price-max').value.trim();
    const pf = {};
    if (pt) pf.property_category = pt;
    if (sfMin) pf.sf_min = +sfMin;
    if (sfMax) pf.sf_max = +sfMax;
    if (priceMin) pf.price_min = +priceMin;
    if (priceMax) pf.price_max = +priceMax;
    if (Object.keys(pf).length) spec.property = pf;

    const accountName = document.getElementById('f-account-name').value.trim();
    if (accountName) spec.account = { ...(spec.account || {}), name: accountName };
    if (activeRoles.size) spec.account = { ...(spec.account || {}), roles: [...activeRoles] };

    const contactName  = document.getElementById('f-contact-name').value.trim();
    const contactTitle = document.getElementById('f-contact-title').value.trim();
    if (contactName || contactTitle) {
      spec.contact = {};
      if (contactName)  spec.contact.name  = contactName;
      if (contactTitle) spec.contact.title = contactTitle;
    }

    const tenantName = document.getElementById('f-tenant-name').value.trim();
    if (tenantName) spec.tenant = { name: tenantName };

    if (currentReturn === 'national_locations') {
      const brand = document.getElementById('f-brand').value.trim();
      const cat   = document.getElementById('f-category').value;
      const lf = {};
      if (brand) lf.brand = brand;
      if (cat)   lf.category = cat;
      if (Object.keys(lf).length) spec.location = lf;
    }

    return spec;
  }

  async function runSearch() {
    const spec = buildSpec();
    // replaceState, not pushState — every filter tweak shouldn't add a back-
    // button stop; this just keeps the address bar (and therefore the URL a
    // detail page links back to) in sync with current filters.
    history.replaceState(null, '', '?' + buildUrlParams().toString());
    try {
      const data = await API.post('/query/', spec);
      currentItems = data.items;
      document.getElementById('result-summary').textContent =
        `${data.total.toLocaleString()} ${data.return_type}${data.total === 1 ? '' : ''} found`;
      renderTable();
      renderMap(currentItems);
    } catch (e) {
      Toast.error('Search failed: ' + e.message);
    }
  }

  // ── List ──────────────────────────────────────────────────────
  const COLS = {
    properties: [
      { key: 'display_name', label: 'Property', render: r => esc(r.display_name) },
      { key: 'city',         label: 'City',     render: r => esc(r.city || '—') },
      { key: 'state',        label: 'State',    render: r => esc(r.state || '—') },
      { key: 'property_type',label: 'Type',     render: r => esc(r.property_type || '—') },
      { key: 'sf_rentable',  label: 'SF',       render: r => `<span class="data-figure">${Fmt.sf(r.sf_rentable)}</span>` },
      { key: 'asking_price', label: 'Price',    render: r => `<span class="data-figure">${Fmt.currency(r.asking_price)}</span>` },
    ],
    accounts: [
      { key: 'display_name', label: 'Account',  render: r => esc(r.display_name) },
      { key: 'roles',        label: 'Roles',    render: r => (r.roles || []).slice(0, 3).join(', ') || '—' },
      { key: 'city',         label: 'City',     render: r => esc(r.city || '—') },
      { key: 'state',        label: 'State',    render: r => esc(r.state || '—') },
      { key: 'linked',       label: 'Properties', render: r => `<span class="data-figure">${(r.linked_properties||[]).length}</span>` },
    ],
    contacts: [
      { key: 'display_name', label: 'Contact',  render: r => esc(r.display_name) },
      { key: 'title',        label: 'Title',    render: r => esc(r.title || '—') },
      { key: 'email',        label: 'Email',    render: r => esc(r.email || '—') },
      { key: 'city',         label: 'City',     render: r => esc(r.city || '—') },
      { key: 'linked',       label: 'Properties', render: r => `<span class="data-figure">${(r.linked_properties||[]).length}</span>` },
    ],
    tenants: [
      { key: 'display_name', label: 'Tenant',   render: r => esc(r.display_name) },
      { key: 'address',      label: 'Property', render: r => esc(r.address || '—') },
      { key: 'city',         label: 'City',     render: r => esc(r.city || '—') },
      { key: 'state',        label: 'State',    render: r => esc(r.state || '—') },
      { key: 'industry',     label: 'Industry', render: r => esc(r.industry || '—') },
    ],
    deals: [
      { key: 'display_name', label: 'Deal',     render: r => esc(r.display_name) },
      { key: 'stage',        label: 'Stage',    render: r => esc(r.stage || '—') },
      { key: 'deal_type',    label: 'Type',     render: r => esc(r.deal_type || '—') },
      { key: 'address',      label: 'Property', render: r => esc((r.linked_properties||[])[0]?.address || '—') },
    ],
    national_locations: [
      { key: 'brand_primary', label: 'Brand',    render: r => esc(r.brand_primary || r.name_primary || '—') },
      { key: 'name_primary',  label: 'Name',     render: r => esc(r.name_primary || '—') },
      { key: 'address',       label: 'Address',  render: r => esc(r.address || '—') },
      { key: 'city',          label: 'City',     render: r => esc(r.city || '—') },
      { key: 'category_top',  label: 'Category', render: r => esc((r.category_top || '—').replace(/_/g, ' ')) },
      { key: 'in_your_book',  label: 'Your book',render: r => r.in_your_book
          ? `<span style="color:var(--accent);font-weight:600">✓ In book</span>` : '' },
      { key: 'owner',        label: '',         render: r =>
          `<button class="btn btn-ghost btn-sm" style="white-space:nowrap"
            onclick="event.stopPropagation();NatLocs.findOwner(${r.id},this)">Find owner</button>` },
    ],
  };

  const DETAIL_PAGE = { property: 'property', account: 'account', contact: 'contact', tenant: 'tenant', deal: 'deal' };
  let displayedRows = [];   // currentItems, in whatever order the table is currently sorted

  function goToDetail(item) {
    const page = DETAIL_PAGE[item.type];
    if (!page) return;
    RecordNav.captureSearchContext(
      displayedRows.length ? displayedRows : currentItems,
      window.location.pathname + window.location.search);
    window.location.href = `/pages/${page}.html?id=${item.id}`;
  }

  function renderTable() {
    const cols = COLS[currentReturn] || [];
    document.getElementById('search-thead').innerHTML =
      cols.map(c => `<th onclick="sortBy('${c.key}')">${c.label}${sortCol === c.key ? (sortDir === 'asc' ? ' ▲' : ' ▼') : ''}</th>`).join('');

    let rows = currentItems.slice();
    if (sortCol) {
      rows.sort((a, b) => {
        let av = sortCol === 'linked' ? (a.linked_properties || []).length : a[sortCol];
        let bv = sortCol === 'linked' ? (b.linked_properties || []).length : b[sortCol];
        if (Array.isArray(av)) av = av.join(',');
        if (Array.isArray(bv)) bv = bv.join(',');
        if (av == null) av = '';
        if (bv == null) bv = '';
        const cmp = (av > bv) - (av < bv);
        return sortDir === 'asc' ? cmp : -cmp;
      });
    }

    document.getElementById('list-count-text').textContent =
      `${rows.length.toLocaleString()} result${rows.length !== 1 ? 's' : ''}`;
    displayedRows = rows;

    const tbody = document.getElementById('search-tbody');
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="${cols.length}"><div class="empty-state">
        <div class="empty-icon">⊙</div><div class="empty-title">No results</div>
        <div class="empty-sub">Try widening your filters.</div></div></td></tr>`;
      return;
    }

    // Map row -> original index in currentItems for marker highlight lookup
    tbody.innerHTML = rows.map(r => {
      const idx = currentItems.indexOf(r);
      return `<tr class="data-row" data-idx="${idx}"
        onmouseenter="highlightRow(${idx}, true)" onmouseleave="highlightRow(${idx}, false)"
        onclick='goToDetail(${JSON.stringify(r).replace(/'/g, "&#39;")})'>
        ${cols.map(c => `<td>${c.render(r)}</td>`).join('')}
      </tr>`;
    }).join('');
  }

  function sortBy(key) {
    if (sortCol === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortCol = key; sortDir = 'asc'; }
    renderTable();
  }

  function esc(s) {
    return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
