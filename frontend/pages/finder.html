<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UpFront Broker — Property Finder</title>
  <link rel="stylesheet" href="/static/main.css?v=4">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    /* Full-height map layout */
    #page-content { padding: 0; flex: 1; position: relative; display: flex; flex-direction: column; }

    /* Search bar */
    #search-bar {
      position: absolute; top: 16px; left: 16px; z-index: 500;
      display: flex; gap: 8px; align-items: center;
      background: #fff; padding: 10px 14px; border-radius: var(--radius-lg);
      box-shadow: var(--shadow-hover); border: 1px solid var(--cream-dark);
    }
    #zip-input {
      width: 100px; border: none; outline: none; font-family: var(--font-body);
      font-size: 15px; font-family: var(--font-mono); letter-spacing: 0.08em;
      color: var(--ink);
    }
    #zip-input::placeholder { color: var(--stone-light); }

    #result-bar {
      position: absolute; top: 72px; left: 16px; z-index: 500;
      background: var(--navy); color: rgba(255,255,255,0.9); padding: 5px 12px;
      border-radius: 20px; font-size: 12px; font-weight: 500;
      display: none;
    }

    /* Map */
    #finder-map { flex: 1; width: 100%; }

    /* Detail panel */
    #detail-panel {
      position: fixed; top: 56px; right: 0; bottom: 0; width: 380px;
      background: #fff; border-left: 1px solid var(--cream-dark);
      box-shadow: -4px 0 24px rgba(0,0,0,0.09);
      z-index: 600; transform: translateX(100%);
      transition: transform 0.25s ease; display: flex; flex-direction: column;
    }
    #detail-panel.open { transform: translateX(0); }

    .panel-header { padding: 16px 18px; border-bottom: 1px solid var(--cream-dark); flex-shrink: 0; }
    .panel-address { font-family: var(--font-serif); font-size: 15px; color: var(--navy); line-height: 1.3; }
    .panel-city    { font-size: 12px; color: var(--stone); margin-top: 3px; }
    .panel-body    { flex: 1; overflow-y: auto; padding: 16px 18px; }

    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--cream-dark); }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--stone); }
    .detail-val   { font-size: 13px; color: var(--ink); font-family: var(--font-mono); text-align: right; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .owner-block {
      background: var(--cream); border-radius: var(--radius); padding: 10px 12px;
      margin: 12px 0; font-size: 12.5px; color: var(--stone); line-height: 1.6;
    }
    .owner-name { font-weight: 600; color: var(--ink); font-size: 13px; }

    .panel-actions { padding: 14px 18px; border-top: 1px solid var(--cream-dark); flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
    .exists-badge { background: var(--green-light); color: var(--green); padding: 6px 12px; border-radius: var(--radius); font-size: 12.5px; font-weight: 500; text-align: center; }

    /* Legend */
    #legend {
      position: absolute; bottom: 24px; left: 16px; z-index: 500;
      background: #fff; padding: 8px 12px; border-radius: var(--radius);
      box-shadow: var(--shadow-card); border: 1px solid var(--cream-dark);
      font-size: 11px; display: flex; gap: 12px; align-items: center;
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; }

    /* Loading overlay on map */
    #map-loading {
      position: absolute; inset: 0; background: rgba(247,244,239,0.85);
      display: none; align-items: center; justify-content: center;
      z-index: 450; flex-direction: column; gap: 12px;
      font-size: 13px; color: var(--stone);
    }
    #map-loading.show { display: flex; }
  </style>
</head>
<body>
<div id="sidebar"></div>

<div id="main">
  <div id="topbar">
    <div class="topbar-title">Property Finder</div>
    <div class="topbar-actions" style="font-size:12px;color:var(--stone)">
      Oakland County · ArcGIS Public Data · CRE only
    </div>
  </div>

  <div id="page-content">
    <!-- Search bar -->
    <div id="search-bar">
      <span style="font-size:16px">⊙</span>
      <input id="zip-input" type="text" placeholder="48009" maxlength="5"
             inputmode="numeric" pattern="\d{5}">
      <button class="btn btn-primary btn-sm" onclick="searchZip()">Search</button>
    </div>

    <!-- Result count -->
    <div id="result-bar"></div>

    <!-- Map -->
    <div id="finder-map"></div>
    <div id="map-loading"><div class="spinner"></div><span id="loading-msg">Searching parcels…</span></div>

    <!-- Legend -->
    <div id="legend" style="display:none">
      <span><span class="legend-dot" style="background:#c9943a"></span>Commercial</span>
      <span><span class="legend-dot" style="background:#0f1923"></span>Industrial</span>
      <span><span class="legend-dot" style="background:#2d7d4f"></span>Agricultural</span>
      <span><span class="legend-dot" style="background:#c47c20"></span>Developmental</span>
      <span><span class="legend-dot" style="background:#8a8278"></span>Residential / Owned</span>
    </div>
  </div>
</div>

<!-- Detail panel -->
<div id="detail-panel">
  <div class="panel-header" style="display:flex;align-items:flex-start;gap:10px">
    <div style="flex:1">
      <div class="panel-address" id="p-address"></div>
      <div class="panel-city"    id="p-city"></div>
    </div>
    <button class="btn btn-ghost" style="padding:4px 8px;font-size:16px;line-height:1;flex-shrink:0" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="p-body"></div>
  <div class="panel-actions" id="p-actions"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/app.js?v=4"></script>
<script>
  if (!Auth.requireAuth()) throw new Error('Not authenticated');
  renderSidebar('finder');

  const TYPE_COLORS = {
    'Residential':          '#8a8278',
    'Residential Condo':    '#8a8278',
    'Residential Apartment':'#8a8278',
    'Residential Vacant Land':'#8a8278',
    'Commercial':           '#c9943a',
    'Commercial Condo':     '#c9943a',
    'Commercial Other':     '#c9943a',
    'Commercial Vacant Land':'#c9943a',
    'Industrial':           '#0f1923',
    'Industrial Condo':     '#0f1923',
    'Industrial Other':     '#0f1923',
    'Agricultural':         '#2d7d4f',
    'Exempt':               '#8a8278',
  };
  const OWNED_COLOR = '#8a8278';

  let leafletMap  = null;
  let markers     = [];
  let currentParcel = null;

  // ── Map init ──────────────────────────────────────────────────────────────
  function initMap() {
    if (leafletMap) return;
    leafletMap = L.map('finder-map', { zoomControl: true }).setView([42.6064, -83.1498], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(leafletMap);
  }

  initMap();

  // ── Search ────────────────────────────────────────────────────────────────
  document.getElementById('zip-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchZip();
  });

  async function searchZip() {
    const zip = document.getElementById('zip-input').value.trim();
    if (!/^\d{5}$/.test(zip)) { Toast.error('Enter a 5-digit zip code'); return; }

    setLoading(true, `Searching parcels in ${zip}…`);
    closePanel();

    try {
      const data = await API.get(`/finder/parcels?zip=${zip}`);
      renderParcels(data.parcels, data.zip);
      const bar = document.getElementById('result-bar');
      bar.textContent = `${data.total} parcel${data.total !== 1 ? 's' : ''} in ${data.zip}`;
      bar.style.display = 'block';
      document.getElementById('legend').style.display = 'flex';
    } catch(e) {
      Toast.error('Parcel search failed: ' + e.message);
    } finally {
      setLoading(false);
    }
  }

  function setLoading(on, msg) {
    const el = document.getElementById('map-loading');
    el.classList.toggle('show', on);
    if (msg) document.getElementById('loading-msg').textContent = msg;
  }

  // ── Render markers ────────────────────────────────────────────────────────
  function renderParcels(parcels, zip) {
    markers.forEach(m => m.remove());
    markers = [];

    const validParcels = parcels.filter(p => p.lat && p.lng);
    if (validParcels.length) {
      // Confirm coordinate order: Leaflet expects [lat, lng] — lat first
      const fp = validParcels[0];
      console.log('[Finder] first marker coords:', fp.lat, fp.lng,
                  '| should be ~42.x, ~-83.x for Oakland County');
    }

    validParcels.forEach(p => {
      const color  = p.exists_in_db ? OWNED_COLOR : (TYPE_COLORS[p.property_type] || '#8a8278');

      // [lat, lng] — lat first, lng second (Leaflet convention)
      const marker = L.circleMarker([p.lat, p.lng], {
        radius: 6,
        fillColor:   color,
        color:       '#fff',
        weight:      1.5,
        opacity:     1,
        fillOpacity: p.exists_in_db ? 0.5 : 0.85,
      });

      marker.on('click', () => openPanel(p));
      marker.bindTooltip(
        `<strong>${p.address || 'No address'}</strong><br>${p.property_type || ''}${p.sf_rentable ? ' · ' + Number(p.sf_rentable).toLocaleString() + ' SF' : ''}`,
        { direction: 'top', offset: [0, -4] }
      );
      marker.addTo(leafletMap);
      markers.push(marker);
    });

    if (markers.length) {
      try {
        const group = L.featureGroup(markers);
        leafletMap.fitBounds(group.getBounds(), { padding: [20, 20] });
      } catch(_) {}
    }
  }

  // ── Panel ─────────────────────────────────────────────────────────────────
  function openPanel(parcel) {
    currentParcel = parcel;
    document.getElementById('p-address').textContent = parcel.address || parcel.keypin || '—';
    document.getElementById('p-city').textContent =
      [parcel.city, parcel.state, parcel.zip].filter(Boolean).join(', ');

    // Renders a row only if val is non-null and non-empty
    function row(label, val) {
      if (val == null || val === '') return '';
      return `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-val" title="${val}">${val}</span></div>`;
    }
    const fmtSF  = v => v ? Number(v).toLocaleString() + ' SF' : null;
    const fmtVal = v => v ? Fmt.currency(v) : null;

    // Owner block
    const ownerName = parcel.name1 || parcel.owner || '';
    const ownerHtml = ownerName ? `<div class="owner-block">
        <div class="owner-name">${ownerName}</div>
        ${parcel.name2 ? `<div>${parcel.name2}</div>` : ''}
      </div>` : '';

    document.getElementById('p-body').innerHTML =
      ownerHtml +
      `<div>
        ${row('Owner',          parcel.name1 || parcel.owner)}
        ${row('Owner 2',        parcel.name2)}
        ${row('Mailing Address',parcel.postaladdress)}
        ${row('Address',        parcel.address)}
        ${row('City',           parcel.city)}
        ${row('ZIP',            parcel.zip)}
        ${row('County',         parcel.county)}
        ${row('Type',           parcel.property_type)}
        ${row('Class Code',     parcel.classcode)}
        ${row('Municipality',   parcel.cvttaxdescription)}
        ${row('Structure',      parcel.subtype)}
        ${row('Building SF',    fmtSF(parcel.sf_rentable))}
        ${row('Living Area SF', fmtSF(parcel.living_area_sqft))}
        ${row('Parcel Area SF', fmtSF(parcel.shapearea))}
        ${row('Beds',           parcel.bedrooms != null ? String(parcel.bedrooms) : null)}
        ${row('Baths',          parcel.bathrooms != null ? String(parcel.bathrooms) : null)}
        ${row('Assessed Value', fmtVal(parcel.assessed_value))}
        ${row('Taxable Value',  fmtVal(parcel.taxablevalue))}
        ${row('Parcel ID',      parcel.keypin)}
      </div>`;

    const actions = document.getElementById('p-actions');
    if (parcel.exists_in_db) {
      actions.innerHTML = `<div class="exists-badge">✓ Already in your Properties</div>
        <button class="btn btn-outline btn-sm" onclick="navigate('properties')">View Properties →</button>`;
    } else {
      actions.innerHTML = `
        <button class="btn btn-primary" onclick="addParcel(false)">Add to Properties</button>
        <button class="btn btn-outline btn-sm" onclick="addParcel(true)">Add + Start Prospecting Deal</button>`;
    }

    document.getElementById('detail-panel').classList.add('open');
  }

  function closePanel() {
    document.getElementById('detail-panel').classList.remove('open');
    currentParcel = null;
  }

  // ── Add to pipeline ───────────────────────────────────────────────────────
  async function addParcel(createDeal) {
    if (!currentParcel) return;
    const btns = document.querySelectorAll('#p-actions button');
    btns.forEach(b => b.disabled = true);

    try {
      const result = await API.post('/finder/add', {
        parcel: currentParcel,
        create_deal: createDeal,
      });

      if (result.duplicate) {
        Toast.info('Property already in your database');
        currentParcel.exists_in_db = true;
      } else {
        Toast.success(`Property added${result.deal ? ' + deal created' : ''}`);
        currentParcel.exists_in_db = true;
        // Update marker color
        markers.forEach(m => {
          if (m.getLatLng().lat === currentParcel.lat &&
              m.getLatLng().lng === currentParcel.lng) {
            m.setStyle({ fillColor: OWNED_COLOR, fillOpacity: 0.5 });
          }
        });
      }

      // Refresh panel actions
      const actions = document.getElementById('p-actions');
      actions.innerHTML = `<div class="exists-badge">✓ Added to Properties</div>
        ${result.deal ? `<div style="font-size:12px;color:var(--stone);text-align:center">Deal: ${result.deal.name}</div>` : ''}
        <button class="btn btn-outline btn-sm" onclick="navigate('properties')">View Properties →</button>`;
    } catch(e) {
      Toast.error(e.message);
      btns.forEach(b => b.disabled = false);
    }
  }
</script>
</body>
</html>
