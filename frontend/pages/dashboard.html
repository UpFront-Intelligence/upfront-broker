<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UpFront Broker — Dashboard</title>
  <link rel="stylesheet" href="/static/main.css">
  <style>
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .pipeline-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* Pipeline funnel */
    .funnel-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--cream-dark);
      cursor: pointer;
      transition: background 0.1s;
    }
    .funnel-row:last-child { border-bottom: none; }
    .funnel-row:hover { background: var(--cream); margin: 0 -20px; padding: 10px 20px; }

    .funnel-stage { width: 120px; font-size: 12.5px; font-weight: 500; color: var(--stone); }
    .funnel-bar-wrap { flex: 1; height: 8px; background: var(--cream-dark); border-radius: 4px; overflow: hidden; }
    .funnel-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .funnel-count { width: 32px; text-align: right; font-family: var(--font-mono); font-size: 13px; font-weight: 500; color: var(--navy); }
    .funnel-value { width: 90px; text-align: right; font-family: var(--font-mono); font-size: 12px; color: var(--stone); }

    /* Recent activity */
    .activity-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--cream-dark);
      align-items: flex-start;
    }
    .activity-item:last-child { border-bottom: none; }

    .activity-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .activity-body { flex: 1; min-width: 0; }
    .activity-text { font-size: 13px; color: var(--ink); line-height: 1.4; }
    .activity-text strong { font-weight: 600; }
    .activity-time { font-size: 11px; color: var(--stone-light); margin-top: 2px; }

    /* Upcoming closes */
    .close-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--cream-dark);
    }
    .close-item:last-child { border-bottom: none; }

    .close-date {
      width: 44px;
      text-align: center;
      flex-shrink: 0;
    }
    .close-date .day { font-family: var(--font-mono); font-size: 18px; font-weight: 500; color: var(--navy); line-height: 1; }
    .close-date .month { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--stone); }

    .close-info { flex: 1; min-width: 0; }
    .close-name { font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .close-address { font-size: 11.5px; color: var(--stone); }
    .close-commission { font-family: var(--font-mono); font-size: 13px; color: var(--green); font-weight: 500; white-space: nowrap; }

    /* Commission YTD card */
    .commission-card {
      background: var(--navy);
      color: #fff;
      border-radius: var(--radius-lg);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .commission-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,148,58,0.2) 0%, transparent 70%);
    }

    .commission-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--stone);
      margin-bottom: 8px;
    }

    .commission-value {
      font-family: var(--font-mono);
      font-size: 32px;
      font-weight: 500;
      color: var(--gold-light);
      letter-spacing: -1px;
    }

    .commission-sub {
      font-size: 12px;
      color: var(--stone-light);
      margin-top: 6px;
    }

    /* Welcome bar */
    .welcome-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .welcome-text { font-family: var(--font-serif); font-size: 22px; color: var(--navy); }
    .welcome-date { font-size: 12px; color: var(--stone); }

    @media (max-width: 1100px) {
      .stat-grid { grid-template-columns: repeat(3, 1fr); }
      .pipeline-grid { grid-template-columns: 1fr; }
      .bottom-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="sidebar"></div>

  <div id="main">
    <div id="topbar">
      <div class="topbar-title">Dashboard</div>
      <div class="topbar-actions">
        <div class="topbar-search">
          <span>⌕</span>
          <input type="text" id="global-search" placeholder="Search properties, contacts, deals...">
        </div>
        <button class="btn btn-primary btn-sm" onclick="navigate('deals')">+ New Deal</button>
      </div>
    </div>

    <div id="page-content" class="fade-in">
      <!-- Welcome -->
      <div class="welcome-bar">
        <div>
          <div class="welcome-text" id="welcome-msg">Good morning</div>
          <div class="welcome-date" id="welcome-date"></div>
        </div>
        <button class="btn btn-outline btn-sm" onclick="navigate('properties')">+ Add Property</button>
      </div>

      <!-- Stat Cards -->
      <div class="stat-grid" id="stat-grid">
        <div class="stat-card">
          <div class="stat-label">Active Deals</div>
          <div class="stat-value" id="stat-active">—</div>
          <div class="stat-sub">In pipeline</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Under Contract</div>
          <div class="stat-value" id="stat-contract">—</div>
          <div class="stat-sub">Deals closing</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Properties</div>
          <div class="stat-value" id="stat-properties">—</div>
          <div class="stat-sub">In database</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Contacts</div>
          <div class="stat-value" id="stat-contacts">—</div>
          <div class="stat-sub">Relationships</div>
        </div>
        <div class="commission-card">
          <div class="commission-label">Commission YTD</div>
          <div class="commission-value" id="stat-commission">$—</div>
          <div class="commission-sub" id="stat-commission-sub">Closed deals this year</div>
        </div>
      </div>

      <!-- Pipeline + Closes -->
      <div class="pipeline-grid">
        <!-- Pipeline Funnel -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">Pipeline by Stage</div>
            <button class="btn btn-ghost btn-sm" onclick="navigate('deals')">View all →</button>
          </div>
          <div class="card-body" id="pipeline-funnel">
            <div style="text-align:center;padding:30px;color:var(--stone)"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Upcoming Closes -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">Upcoming Closes</div>
            <span class="badge badge-gold" id="close-count">0</span>
          </div>
          <div class="card-body" id="upcoming-closes">
            <div style="text-align:center;padding:30px;color:var(--stone)"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <!-- Recent Activity + Properties -->
      <div class="bottom-grid">
        <!-- Recent Activity -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">Recent Activity</div>
          </div>
          <div class="card-body" id="recent-activity">
            <div style="text-align:center;padding:30px;color:var(--stone)"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Recent Properties -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">Recent Properties</div>
            <button class="btn btn-ghost btn-sm" onclick="navigate('properties')">View all →</button>
          </div>
          <div class="card-body" id="recent-properties">
            <div style="text-align:center;padding:30px;color:var(--stone)"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    (async () => {
    // The landing page (/api/auth/landing) writes ufb_token directly to
    // localStorage before navigating here — no cookie migration needed.
    if (!Auth.requireAuth()) return;
    renderSidebar('dashboard');

    // Welcome message
    const user = Auth.user();
    const hour = new Date().getHours();
    const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    const firstName = user ? (user.full_name || '').split(' ')[0] : '';
    document.getElementById('welcome-msg').textContent = `${greet}${firstName ? ', ' + firstName : ''}.`;
    document.getElementById('welcome-date').textContent = new Date().toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
    });

    const STAGE_COLORS = {
      'Prospecting':    '#94a3b8',
      'Pitching':       '#3b82f6',
      'Active Listing': '#f59e0b',
      'Under Contract': '#10b981',
      'Closed':         '#0f1923',
      'Dead':           '#ef4444',
    };

    async function loadDashboard() {
      try {
        // Load in parallel
        const [summary, deals, properties, contacts, activities] = await Promise.all([
          API.get('/deals/pipeline-summary'),
          API.get('/deals/'),
          API.get('/properties/'),
          API.get('/contacts/'),
          API.get('/activities/'),
        ]);

        // Stats
        document.getElementById('stat-active').textContent = summary.total_deals || 0;
        document.getElementById('stat-contract').textContent = summary.by_stage['Under Contract'] || 0;
        document.getElementById('stat-properties').textContent = properties.length || 0;
        document.getElementById('stat-contacts').textContent = contacts.length || 0;
        document.getElementById('stat-commission').textContent = Fmt.currency(summary.closed_commission_ytd || 0);
        document.getElementById('stat-commission-sub').textContent =
          `${summary.by_stage['Closed'] || 0} closed deal${summary.by_stage['Closed'] !== 1 ? 's' : ''} this year`;

        // Pipeline funnel
        const stages = ['Prospecting','Pitching','Active Listing','Under Contract','Closed'];
        const maxCount = Math.max(...stages.map(s => summary.by_stage[s] || 0), 1);
        const funnelHtml = stages.map(stage => {
          const count = summary.by_stage[stage] || 0;
          const width = Math.round((count / maxCount) * 100);
          const stageDeals = deals.filter(d => d.stage === stage);
          const stageValue = stageDeals.reduce((s, d) => s + (d.our_commission || 0), 0);
          return `
            <div class="funnel-row" onclick="navigate('deals')">
              <div class="funnel-stage"><span class="stage-pill ${Fmt.stageClass(stage)}">${stage}</span></div>
              <div class="funnel-bar-wrap">
                <div class="funnel-bar" style="width:${width}%;background:${STAGE_COLORS[stage]}"></div>
              </div>
              <div class="funnel-count">${count}</div>
              <div class="funnel-value">${stageValue > 0 ? Fmt.currency(stageValue) : ''}</div>
            </div>
          `;
        }).join('');
        document.getElementById('pipeline-funnel').innerHTML = funnelHtml || emptyState('No deals yet', 'Add your first deal to see your pipeline');

        // Upcoming closes — next 90 days, sorted
        const today = new Date();
        const soon  = new Date(today); soon.setDate(today.getDate() + 90);
        const closing = deals
          .filter(d => d.projected_close && d.stage !== 'Closed' && d.stage !== 'Dead')
          .filter(d => { const dt = new Date(d.projected_close); return dt >= today && dt <= soon; })
          .sort((a,b) => new Date(a.projected_close) - new Date(b.projected_close))
          .slice(0, 6);

        document.getElementById('close-count').textContent = closing.length;
        document.getElementById('upcoming-closes').innerHTML = closing.length
          ? closing.map(d => {
              const dt  = new Date(d.projected_close);
              const day = dt.getDate();
              const mon = dt.toLocaleString('en-US', { month: 'short' });
              return `
                <div class="close-item" onclick="navigate('deals')">
                  <div class="close-date">
                    <div class="day">${day}</div>
                    <div class="month">${mon}</div>
                  </div>
                  <div class="close-info">
                    <div class="close-name">${d.name}</div>
                    <div class="close-address">${d.deal_type || 'Deal'}</div>
                  </div>
                  <div class="close-commission">${d.our_commission ? Fmt.currency(d.our_commission) : ''}</div>
                </div>
              `;
            }).join('')
          : emptyState('No upcoming closes', 'Set projected close dates on your active deals');

        // Recent activity
        const recentActs = activities.slice(0, 8);
        const actIcons = {
          'Call':'📞','Email':'✉️','Meeting':'🤝','Tour':'🏢',
          'Offer':'📋','LOI':'📄','Contract':'✍️','Note':'📝'
        };
        document.getElementById('recent-activity').innerHTML = recentActs.length
          ? recentActs.map(a => `
              <div class="activity-item">
                <div class="activity-dot" style="background:var(--cream-dark)">${actIcons[a.activity_type] || '●'}</div>
                <div class="activity-body">
                  <div class="activity-text"><strong>${a.activity_type}</strong>${a.subject ? ' — ' + a.subject : ''}</div>
                  ${a.notes ? `<div class="activity-time" style="font-size:12px;color:var(--stone);margin-top:2px">${a.notes.substring(0,80)}${a.notes.length>80?'…':''}</div>` : ''}
                  <div class="activity-time">${Fmt.date(a.activity_date || a.created_at)}</div>
                </div>
              </div>
            `).join('')
          : emptyState('No activity yet', 'Log calls, emails, and meetings to track your pipeline');

        // Recent properties
        const recentProps = [...properties].reverse().slice(0, 6);
        document.getElementById('recent-properties').innerHTML = recentProps.length
          ? recentProps.map(p => `
              <div class="close-item" onclick="navigate('properties')" style="cursor:pointer">
                <div style="width:36px;height:36px;border-radius:var(--radius);background:var(--cream-dark);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">
                  ${Fmt.propType(p.property_type)}
                </div>
                <div class="close-info">
                  <div class="close-name">${p.name || p.address}</div>
                  <div class="close-address">${p.city}, ${p.state} · ${p.property_type || 'Commercial'}</div>
                </div>
                <div style="text-align:right;flex-shrink:0">
                  <div style="font-size:12px;font-weight:500;color:var(--navy)">${p.asking_price ? Fmt.currency(p.asking_price) : ''}</div>
                  <div class="badge badge-stone" style="font-size:10px">${p.status || 'Active'}</div>
                </div>
              </div>
            `).join('')
          : emptyState('No properties yet', 'Add your first property to get started');

      } catch (e) {
        Toast.error('Failed to load dashboard: ' + e.message);
      }
    }

    function emptyState(title, sub) {
      return `<div class="empty-state" style="padding:30px 10px">
        <div class="empty-title">${title}</div>
        <div class="empty-sub">${sub}</div>
      </div>`;
    }

    loadDashboard();
    })(); // end async IIFE
  </script>
</body>
</html>
