services:
  - type: web
    name: upfront-broker
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: upfront-broker-db
          property: connectionString
      - key: SECRET
        generateValue: true
      # Set these manually in the Render dashboard after first deploy:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Set to: https://YOUR-APP.onrender.com/api/auth/callback
      # Also add this URL as an authorised redirect URI in Google Cloud Console
      - key: CALLBACK_URL
        sync: false

databases:
  - name: upfront-broker-db
    databaseName: upfront_broker
    user: upfront_broker
