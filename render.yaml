services:
  - type: web
    name: upfront-broker
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: upfront-broker-db
          property: connectionString
      - key: SECRET
        generateValue: true

databases:
  - name: upfront-broker-db
    databaseName: upfront_broker
    user: upfront_broker
