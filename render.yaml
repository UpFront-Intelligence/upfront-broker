services:
  - type: web
    name: upfront-broker
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: upfront-broker-db
          property: connectionString
      - key: SECRET
        generateValue: true
      # Set these manually in the Render dashboard:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # CALLBACK_URL is auto-derived from Render's RENDER_EXTERNAL_URL —
      # no need to set it manually. Add this URI to Google Cloud Console:
      #   https://YOUR-APP.onrender.com/api/auth/google/callback

databases:
  - name: upfront-broker-db
    databaseName: upfront_broker
    user: upfront_broker
